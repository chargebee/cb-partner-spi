      type: string
      enum: [ IN_PROGRESS, SUCCESS, FAILURE, UNKNOWN ]
      description: |
        Status of the refund transaction:
        * IN_PROGRESS - Refund is pending and has not yet been processed
        * SUCCESS - Refund has been successfully processed
        * FAILURE - Refund transaction failed
        * UNKNOWN - Refund status cannot be determined
      x-field-extra-annotation: "@NonSensitive"
    
    PaymentStatus:
      type: string
      enum: [AUTHORIZED, CAPTURED, FAILURE, REQUIRE_CHALLENGE, REQUIRES_IDENTIFICATION, REQUIRES_ACTION, IN_PROGRESS, PENDING_AUTHORIZATION, DELAYED_AUTHORIZATION, VOID, LATE_PAYMENT_FAILURE, UNKNOWN]
      description: |
        Status of the payment transaction:
        * AUTHORIZED - Payment has been authorized but not yet captured
        * CAPTURED - Payment has been captured successfully
        * FAILURE - Payment transaction failed
        * REQUIRE_CHALLENGE - Additional authentication challenge is required
        * REQUIRES_IDENTIFICATION - Customer identification is required
        * REQUIRES_ACTION - Customer action is required to complete payment
        * IN_PROGRESS - Payment is being processed
        * PENDING_AUTHORIZATION - Authorization is pending
        * DELAYED_AUTHORIZATION - Authorization has been delayed
        * VOID - Payment has been voided
        * LATE_PAYMENT_FAILURE - Payment failed after initial processing
        * UNKNOWN - Payment status cannot be determined
      x-field-extra-annotation: "@NonSensitive"

