openapi: 3.0.0
info:
  title: OpenPay Payment Gateway Interface
  version: 1.0.0
  description: Interface definition for interacting with various payment gateways through OpenPay.

paths:
  /{env}/payment-methods:
    post:
      summary: Create a payment method along with customer profile in the payment gateway
      description: >
        Registers a new payment method and associates it with a customer profile. 
        Depending on the integration's requirements, this operation may also create a customer profile
          and associate the payment method with it.
      operationId: addPaymentMethod
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPaymentMethodRequest'
      responses:
        '200':
          description: Payment method created and linked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddPaymentMethodResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '500':
          description: Server error.
      tags:
        - Payment Methods
    put:
      summary: Update a payment method
      description: >
        Updates an existing payment method with new details such as billing information or payment method details.
        This operation allows modification of payment method properties while maintaining the same token.
      operationId: updatePaymentMethod
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentMethodRequest'
      responses:
        '200':
          description: Payment method updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePaymentMethodResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment method not found.
        '500':
          description: Server error.
      tags:
        - Payment Methods
  /{env}/payment-methods/retrieve:
    post:
      summary: Retrieve payment method details
      description: >
        Retrieves payment method details from a payment gateway.
        At least one of `payment_method_token` or `customer_id` must be provided.
        Some gateways may require both. 
        Additional gateway-specific parameters may also be included in the request body.
      operationId: getPaymentMethod
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetPaymentMethodRequest'
      responses:
        '200':
          description: Payment method retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentMethodResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment method not found.
        '500':
          description: Server error.
      tags:
        - Payment Methods
  /{env}/payment-methods/confirm:
    post:
      summary: Confirm a payment method
      description: >
        Confirms a payment method after it has been created or updated.
        This operation is typically used to finalize the setup of a payment method that requires additional verification or confirmation.
      operationId: confirmPaymentMethod
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPaymentMethodRequest'
      responses:
        '200':
          description: Payment method confirmed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmPaymentMethodResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment method not found.
        '500':
          description: Server error.
      tags:
        - Payment Methods
  
  /{env}/payment-methods/delete:
    post:
      summary: Delete a payment method
      description: >
        Deletes a payment method from the payment gateway.
        The `token` parameter is required to identify the payment method to be deleted.
      operationId: deletePaymentMethod
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeletePaymentMethodRequest'
      responses:
        '204':
          description: Payment method deleted successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment method not found.
        '500':
          description: Server error.
      tags:
        - Payment Methods
  /{env}/payment-intents:
    post:
      summary: Create a payment intent
      description: >
        Initiates a payment intent for processing a payment through the specified gateway.
        This operation is used to prepare for a payment transaction, including setting up necessary details like amount, currency, and customer information.
      operationId: createPaymentIntent
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      responses:
        '200':
          description: Payment intent created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentIntentResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '500':
          description: Server error.
      tags:
        - Payment Intents
  /{env}/payments/verify:
    post:
      summary: Verify a payment
      description: >
        Verifies a payment transaction to ensure it has been processed successfully.
        This operation is typically used to confirm the status of a payment after it has been initiated.
      operationId: verifyPayment
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPaymentRequest'
      responses:
        '200':
          description: Payment verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyPaymentResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment not found.
        '500':
          description: Server error.
      tags:
        - Payments
  /{env}/payments/capture:
    post:
      summary: Capture a payment
      description: >
        Captures a payment that has been authorized but not yet settled.
        This operation is used to finalize the payment transaction and transfer funds.
      operationId: capturePayment
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapturePaymentRequest'
      responses:
        '200':
          description: Payment captured successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapturePaymentResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment not found.
        '500':
          description: Server error.
      tags:
        - Payments
  /{env}/payments/refund:
    post:
      summary: Refund a payment
      description: >
        Initiates a refund for a previously captured payment.
        This operation is used to return funds to the customer after a successful payment.
      operationId: refundPayment
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPaymentRequest'
      responses:
        '200':
          description: Payment refunded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundPaymentResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment not found.
        '500':
          description: Server error.
      tags:
        - Payments
  /{env}/payments/void:
    post:
      summary: Void a payment
      description: >
        Voids a payment that has been authorized but not yet captured.
        This operation is used to cancel a payment before funds are transferred.
      operationId: voidPayment
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoidPaymentRequest'
      responses:
        '200':
          description: Payment voided successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoidPaymentResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment not found.
        '500':
          description: Server error.
      tags:
        - Payments
  /{env}/payments:
    post:
      summary: Process a payment
      description: >
        Processes a payment transaction through the specified gateway.
        This operation is used to initiate a payment using a previously created payment method.
      operationId: processPayment
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectPaymentRequest'
      responses:
        '200':
          description: Payment processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectPaymentResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment method not found.
        '500':
          description: Server error.
      tags:
        - Payments
  /{env}/payments/retrieve:
    post:
      summary: Retrieve payment details
      description: >
        Retrieves details of a specific payment transaction using its unique identifier.
        This operation is used to fetch information about a completed or pending payment.
      operationId: retrievePayment
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrievePaymentsRequest'
      responses:
        '200':
          description: Payment details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrievePaymentsResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '404':
          description: Payment not found.
        '500':
          description: Server error.
      tags:
        - Payments

  /{env}/gateway/setup:
    post:
      summary: Set up gateway connection
      description: >
        Sets up the gateway account based on the provided context. This method can either
        validate or register the gateway account depending on the gateway type and the
        context provided. The specific action is determined by the gateway integration logic.
        
        - If the integration is with a direct gateway, this method can validate the credentials
          if applicable.
        - If the integration is with an orchestrator, the merchant credentials may need to be
          registered with the orchestrator, and the registered references will be returned.
      operationId: setupGatewayAccount
      parameters:
        - $ref: '#/components/parameters/EnvParam'
        - $ref: '#/components/parameters/XSiteNameParam'
        - $ref: '#/components/parameters/XIdempotencyKeyParam'
        - $ref: '#/components/parameters/TraceparentParam'
        - $ref: '#/components/parameters/BaggageParam'
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupGatewayRequest'
      responses:
        '200':
          description: Gateway setup completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupGatewayResponse'
        '400':
          description: Bad request or invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenPayException'
        '500':
          description: Server error.
      tags:
        - Gateway Setup

components:
  parameters:
    EnvParam:
      name: env
      in: path
      required: true
      schema:
        type: string
        enum: [sandbox, live]
        x-field-extra-annotation: "@NonSensitive"
      description: Specifies the environment to use.
    
    XSiteNameParam:
      name: x-site-name
      in: header
      required: true
      schema:
        type: string
        x-field-extra-annotation: "@NonSensitive"
      description: Site name in Chargebee.
    
    XIdempotencyKeyParam:
      name: x-idempotency-key
      in: header
      required: false
      schema:
        type: string
        x-field-extra-annotation: "@NonSensitive"
      description: Unique key to ensure idempotent requests.
    
    TraceparentParam:
      name: traceparent
      in: header
      required: false
      schema:
        type: string
        x-field-extra-annotation: "@NonSensitive"
      description: Trace context for distributed tracing (see https://www.w3.org/TR/trace-context/).
    
    BaggageParam:
      name: baggage
      in: header
      required: false
      schema:
        type: string
        x-field-extra-annotation: "@NonSensitive"
      description: |
        W3C Baggage header for propagating log context key-value pairs across service boundaries.
        Format: key1=value1,key2=value2 (URL-encoded values if needed)
        See https://www.w3.org/TR/baggage/
    
    AuthorizationHeader:
      name: authorization
      in: header
      required: true
      schema:
        type: string
        x-field-extra-annotation: "@Secret"
      description: |
        * **Gateway Credentials** – Used to authenticate with the payment gateway.
        * **Platform Credentials** – Credentials for payment orchestrators such as Spreedly, Payfurl, etc, if gateway is communicated via orchestrators.
        * **Setup Parameters** – Additional parameters required for communication with the orchestrator or gateway.
          Some orchestrators provide parameters during setup that need to be included in every request made to the orchestrator.
        ```
        {
          "gateway_credentials": { "cred": "sk_test_123" },
          "platform_credentials": { "key": "sk_test_324" },
          "set_up_parameters": { "provider_id": "provider_123" }
        }
        ```  
        Example header:
        ```
        Authorization: Bearer <base64-encoded-JSON>
        ```  
  schemas:
    GetPaymentMethodResponse:
      type: object
      description: Response object containing an array of payment method details
      properties:
        payment_methods:
          type: array
          description: Array of payment method objects
          items:
            $ref: '#/components/schemas/PaymentMethod'
    
    AddPaymentMethodResponse:
      type: object
      description: Response object containing details of the created payment method
      properties:
        token:
          type: string
          description: Token representing the payment method, can be used for future transactions
          x-field-extra-annotation: "@PCI"
        customer_id:
          type: string
          description: Unique identifier of the customer associated with this payment method in the payment gateway system
          x-field-extra-annotation: "@NonSensitive"
        initial_scheme_transaction_id:
          type: string
          description: Initial transaction ID from the payment scheme (e.g., Visa, Mastercard network)
          x-field-extra-annotation: "@NonSensitive"
        initial_gateway_transaction_id:
          type: string
          description: Initial transaction ID from the payment gateway
          x-field-extra-annotation: "@NonSensitive"
        payment_method:
          $ref: '#/components/schemas/PaymentMethodType'
        gateway_name:
          type: string
          description: Name of the payment gateway used for processing
          x-field-extra-annotation: "@NonSensitive"
        card:
          $ref: '#/components/schemas/CardResponse'
        bank_account:
          $ref: '#/components/schemas/BankAccountResponse'
        boleto:
          $ref: '#/components/schemas/BoletoResponse'
        mandate:
          $ref: '#/components/schemas/Mandate'
        billing_address:
          $ref: '#/components/schemas/BillingAddress'
        status_reason:
          type: string
          description: Reason for the current status of the payment method, usually error reason
          x-field-extra-annotation: "@NonSensitive"
        additional_data:
          $ref: '#/components/schemas/AdditionalData'
        redirection:
          $ref: '#/components/schemas/Redirection'
        status:
          $ref: '#/components/schemas/PaymentMethodStatus'

    AuthContext:
      type: object
      description: |
        Represents the authentication context for the payment request, including credentials and setup parameters.
      properties:
        gateway_credentials:
          type: object
          description: Credentials for the payment gateway.
          additionalProperties:
            type: string
            x-field-extra-annotation: "@Secret"
        platform_credentials:
          type: object
          description: Credentials for the payment orchestrator or platform.
          additionalProperties:
            type: string
            x-field-extra-annotation: "@Secret"
        set_up_parameters:
          type: object
          description: Additional parameters required for communication with the orchestrator or gateway.
            Some orchestrators provide parameters during setup that need to be included in every request made to the orchestrator.
          additionalProperties:
            type: string
            x-field-extra-annotation: "@NonSensitive"

    AddPaymentMethodRequest:
      type: object
      description: |
        Represents the request to add a payment method for a customer. 
        Supports creation with raw payment details and gateway/orchestrator tokens.
      required:
        - context
        - input_type
      properties:
        context:
          $ref: '#/components/schemas/RequestContext'
        input_type:
          $ref: '#/components/schemas/PaymentMethodInputType'
        customer:
          $ref: '#/components/schemas/CustomerRequest'
        token:
          type: string
          description: A token representing the payment method, typically used for temporary or permanent tokens.
          x-field-extra-annotation: "@PCI"
        card:
          $ref: '#/components/schemas/CardRequest'
        bank_account:
          $ref: '#/components/schemas/BankAccountRequest'
        apple_pay:
          $ref: '#/components/schemas/ApplePayRequest'
        plaid:
          $ref: '#/components/schemas/PlaidRequest'
        upi:
          $ref: '#/components/schemas/UpiRequest'
        ideal:
          $ref: '#/components/schemas/IdealRequest'
        sofort:
          $ref: '#/components/schemas/SofortRequest'
        boleto:
          $ref: '#/components/schemas/BoletoRequest'
        verification:
          $ref: '#/components/schemas/PaymentMethodVerification'
        session:
          $ref: '#/components/schemas/Session'
        billing_address:
          $ref: '#/components/schemas/BillingAddress'
        redirection:
          $ref: '#/components/schemas/Redirection'
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Additional metadata to be sent to the payment gateway, can include custom fields or identifiers.  
        gateway_request_reference:
          type: string
          description: >
            A reference to the request made to the payment gateway. This is used for tracking and reconciliation purposes.
            It is optional and can be used to correlate the request with the response from the gateway.
            For eg: Adyen stores this value in `reference` field of their response objects.
          x-field-extra-annotation: "@NonSensitive"
        chargebee_context:
          $ref: '#/components/schemas/CbContext'
    
    PaymentMethodInputType:
      type: string
      enum: [ RAW_INFORMATION, TEMPORARY_TOKEN, ORCHESTRATOR_TEMP_TOKEN, PERMANENT_TOKEN ]
      description: |
        Type of input used to add the payment method.
        - RAW_INFORMATION: Raw payment details (e.g., card, bank).
        - TEMPORARY_TOKEN: Temporary token representing payment data.
        - ORCHESTRATOR_TEMP_TOKEN: Token from payment orchestrator.
        - PERMANENT_TOKEN: Persistent token representing a saved payment method.
      x-field-extra-annotation: "@NonSensitive"

    RequestContext:
      type: object
      description: Common context fields shared by payment requests.
      required:
        - integration_name
        - gateway_name
        - payment_method_type
      properties:
        integration_name:
          type: string
          description: The name of the integration. It can be either an orchestrator like Spreedly or a gateway like Stripe.
          x-field-extra-annotation: "@NonSensitive"
        gateway_name:
          type: string
          description: The name of the specific gateway (e.g., stripe, adyen) to use within the integration.
          x-field-extra-annotation: "@NonSensitive"
        payment_method_type:
          $ref: '#/components/schemas/PaymentMethodType'

    GetPaymentMethodRequest:
      type: object
      description: Request object for retrieving payment method details
      required:
        - context
      properties:
        context:
          $ref: '#/components/schemas/RequestContext'
        payment_method_token:
          type: string
          description: Token or ID representing the payment method
          x-field-extra-annotation: "@PCI"
        customer_id:
          type: string
          description: Unique identifier for the customer
          x-field-extra-annotation: "@PII"
        additional_data:
          type: object
          additionalProperties:
            type: string
            x-field-extra-annotation: "@NonSensitive"
          description: Additional data to be sent to the payment gateway

    DeletePaymentMethodRequest:
      type: object
      description: Request object for deleting a payment method
      required:
        - context
        - token
      properties:
        context:
          $ref: '#/components/schemas/RequestContext'
        token:
          type: string
          description: Token or ID representing the payment method to be deleted
          x-field-extra-annotation: "@PCI"
        additional_info:
          type: object
          additionalProperties:
            type: string
            x-field-extra-annotation: "@NonSensitive"
          description: Additional information to be sent to the payment gateway
    
    PaymentMethodType:
      type: string
      description: Type of payment method.
      enum:
        - card
        - paypal
        - amazon_payments
        - apple_pay
        - ach_credit
        - sepa_credit
        - ideal
        - google_pay
        - sofort
        - bancontact
        - giropay
        - dotpay
        - upi
        - netbanking_emandates
        - boleto
        - venmo
        - pay_to
        - faster_payments
        - sepa_instant_transfer
        - klarna_pay_now
        - online_banking_poland
        - ach
        - bacs
        - sepa
        - autogiro
        - becs
        - becs_nz
        - pad
      x-field-extra-annotation: "@NonSensitive"

    CustomerRequest:
      type: object
      description: Represents a customer profile in the payment system.
      properties:
        id:
          type: string
