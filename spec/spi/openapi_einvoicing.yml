              description: The unique identifier for the company
            display_name:
              type: string
              description: The display name of the company
        status:
          type: object
          properties:
            code:
              type: string
              description: The current status of the activation as reported by the e-invoicing provider.
              enum:
                - COMPLETED
                - FAILED
                - PENDING
            message:
              type: string
              description: A detailed message describing the activation status.

        country_activations:
          type: array
          items:
            $ref: '#/components/schemas/country_activation'
    country_activation:
      type: object
      properties:
        model:
          $ref: '#/components/schemas/model'
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code where the e-invoicing activation
            is applicable.
        einvoicing_type:
          type: string
          description: Specifies the type of business transaction for which e-invoicing
            is applied.
          enum:
            - B2B
            - B2C
            - B2G
        supported_document_types:
          type: array
          description: |
            The types of business documents that are supported for this country activation.
          items:
            type: string
          example:
            - "ubl-invoice" 
            - "ubl-creditnote"
            - "ubl-applicationresponse"
    activations_response:
      type: object
      properties:
        activations:
          type: array
          items:
            $ref: '#/components/schemas/activation'
    business_entities_response:
      type: object
      properties:
        business_entities:
          type: array
          description: List of business_entities retrieved from the e-invoicing provider.
          items:
            type: object
            properties:
              id:
                type: string
                description: The unique identifier of the business entity.
                example: "595e13fd-68b0-40c2-ade3-9780ce339d97"
              display_name:
                type: string
                description: The display name of the business entity.
                example: "Acme BE"
    data_input_fields_response:
      type: object
      properties:
        country:
          type: string
          description: The ISO country code for the scenario.
          example: "DE"
        transaction_type:
          type: string
          description: The type of transaction (B2B, B2C, B2G).
          enum: [B2B, B2C, B2G]
          example: "B2B"
        model:
          $ref: '#/components/schemas/model'
        document_type:
          type: string
          description: Type of business document.
          example: "ubl-invoice"
        fields:
          type: array
          description: List of input fields with inclusion metadata.
          items:
            type: object
            required:
              - path
              - data_type
              - field_name
              - inclusion_type
            properties:
              path:
                type: string
                description: Path of the field in the final XML/UBL or JSON structure (as per provider specification).
                example: "Invoice.cbc:ID"
              field_name:
                type: string
                description: Canonical or local name of the field.
                example: "cbc:ID"
              description:
                type: string
                description: Description of what the field represents.
                example: "Unique identifier for the invoice."
              data_type:
                type: string
                description: Type of data expected.
                enum:
                  - string
                  - number
                  - date
                  - boolean
              documentation_link:
                type: string
                description: External documentation reference for the field (if available).
                example: "https://docs.peppol.eu/poacc/billing/3.0/syntax/ubl-invoice/cbc-ID"
              accepted_values:
                type: array
                items:
                  type: string
                description: Enumerated or acceptable values for the field (if applicable).
                example: []
              default_value:
                type: string
                description: Default value to use if none is provided.
                example: ""
              example:
                type: string
                description: Example value for the field.
                example: "INV-1001"
              inclusion_type:
                type: string
                enum:
                  - Mandatory
                  - Optional
                  - Conditional
                description: |
                  Denotes whether this field is required, optional, or conditional.
                  - `Mandatory`: Must be provided
                  - `Optional`: Can be skipped without affecting processing
                  - `Conditional`: Required under specific conditions
              condition:
                type: object
                description: Optional condition object for Conditional fields.
      example:
        country: "DE"
        transaction_type: "B2B"
        model: "PEPPOL"
        document_type: "ubl-invoice"
        fields:
          - path: "Invoice.cbc:ID"
            field_name: "cbc:ID"
            description: "Unique identifier for the invoice"
            data_type: "string"
            documentation_link: ""
            accepted_values: []
            default_value: ""
            example: "INV-1001"
            inclusion_type: "Mandatory"

          - path: "Invoice.cbc:Note"
            field_name: "cbc:Note"
            description: "Optional description or remarks"
            data_type: "string"
            documentation_link: ""
            accepted_values: []
            default_value: ""
            example: "B2B Transaction"
            inclusion_type: "Optional"

          - path: "Invoice/cbc:BuyerReference"
            field_name: "cbc:BuyerReference"
            description: >
              Buyer Reference: An identifier assigned by the Buyer used for internal routing purposes.
              An invoice must have buyer reference or purchase order reference.
            data_type: "string"
            documentation_link: ""
            accepted_values: []
            default_value: ""
            example: "abs1234"
            inclusion_type: "Conditional"
            condition:

          - path: "Invoice.cac:InvoiceLine.cbc:LineExtensionAmount"
            field_name: "cbc:LineExtensionAmount"
            description: >
              Invoice line net amount — The total amount of the Invoice line. This amount is net (without VAT),
              and must be rounded to a maximum of 2 decimals.
            data_type: "number"
            documentation_link: ""
            accepted_values: []
            default_value: ""
            example: 2145
            inclusion_type: "Conditional"
            condition:
    document:
      type: object
      oneOf:
        - $ref: '#/components/schemas/main_document'
        - $ref: '#/components/schemas/application_response_document'
      discriminator:
        propertyName: type
        mapping:
          INVOICE: '#/components/schemas/main_document'
          CREDIT_NOTE: '#/components/schemas/main_document'
          APPLICATION_RESPONSE: '#/components/schemas/application_response_document'
    main_document:
      type: object
      description: Represents an invoice or credit note document to be validated and submitted via the e-invoicing provider.
      properties:
        id:
          type: string
          description: A unique identifier for the document being submitted. This typically represents the invoice number or credit note number
            generated by Chargebee.
        type:
          type: string
          enum:
            - INVOICE
            - CREDIT_NOTE
          description: Type of document, either an invoice or a credit note.
        country:
          type: string
          description: The ISO country code for the scenario.
          example: "DE"
        transaction_type:
          type: string
          description: The type of transaction (B2B, B2C, B2G).
          enum: [ B2B, B2C, B2G ]
          example: "B2B"
        model:
          $ref: '#/components/schemas/model'
        document_type:
          type: string
          description: Type of business document.
          example: "ubl-invoice"
        issue_date:
          type: string
          format: date
          description: The date when the document was issued. Format "YYYY-MM-DD"
        tax_date:
          type: string
          format: date
          description: The date used to determine tax. Format "YYYY-MM-DD"
        currency_code:
          type: string
          description: The currency code [ISO 4217 format](https://en.wikipedia.org/wiki/ISO_4217) for the document.
        due_date:
          type: string
          format: date
          description: The date when the payment is due. Format "YYYY-MM-DD".
        amount:
          type: number
          description: Total payable amount for the document, including taxes.
        status:
          $ref: '#/components/schemas/document_billing_status'
        taxable_amount:
          type: number
          description: Total document amount excluding tax (VAT).
        amount_due:
          type: number
          description: Outstanding balance remaining on the document.
        total_discount:
          type: number
          description: Sum of all discounts applied across line items on the document.
        note:
          type: string
          description: A textual note that gives unstructured information that is
            relevant to the Document as a whole. Such as the reason for any correction
            or assignment note in case the document has been factored.
        billing_reference:
          type: array
          description: A group of business terms providing information on one or more preceding invoices. This enhances traceability in workflows where a document is linked to earlier billing records. For credit notes this is essential as they must reference the original invoice they amend.
          items:
            type: object
            properties:
              invoice_document_reference:
                type: object
                description: A group of business terms providing information on one
                  or more preceding Invoices.
                properties:
                  id:
                    type: string
                    description: Identifier of the referenced invoice.
                  issue_date:
                    type: string
                    format: date
                    description: Issue date of the referenced invoice.
                required:
                  - id
          required:
            - invoice_document_reference
        accounting_supplier_party:
          type: object
          description: Party responsible for issuing the document (that is, the supplier). This represents the legal entity or business that creates the invoice and bears responsibility for delivering goods or services.
          properties:
